# eBay Dashboard settings — TEMPLATE
# Copy this file to `ebay-settings.conf`, fill in your own values,
# then import it via Settings -> Import from File in the dashboard.
# Lines starting with # are ignored. Format: key = value

app_id = YourName-AppName-PRD-xxxxxxxxx-xxxxxxxx
dev_id = xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
cert_id = PRD-xxxxxxxxxxxx-xxxxxxxx-xxxx-xxxx
token = v^1.1#...your user token...
site = 2
proxy = https://corsproxy.io/?

# Display options — 1 = on, 0 = off. (Inline comments after a value are NOT
# supported, so keep these lines as just `key = 0` or `key = 1`.)
# show_zeros:    show 0 instead of — for empty counts
# show_images:   show a thumbnail image beside each item
# show_relisted: include relisted items in the Unsold tab
show_zeros = 0
show_images = 0
show_relisted = 0
